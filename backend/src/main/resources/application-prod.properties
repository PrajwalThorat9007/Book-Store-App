# Production Configuration - Supabase PostgreSQL

# Application
spring.application.name=Bookstore Backend - Production

# Server Configuration
server.port=${PORT:8080}

# Supabase PostgreSQL Database Configuration
# TODO: Set these as environment variables in your deployment platform
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://your-supabase-project.supabase.co:5432/postgres}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:your-password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# H2 Console (disabled in production)
spring.h2.console.enabled=false

# JWT Configuration
jwt.secret=${JWT_SECRET:your-production-secret-key-minimum-256-bits-change-this}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Logging
logging.level.com.bookstore=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# Swagger/OpenAPI (optional: disable in production)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
