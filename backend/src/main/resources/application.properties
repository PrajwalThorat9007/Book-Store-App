# Manas: Module changed → application.properties
# What's changed: Single clean file. No duplicates. H2 fully configured here.
#                 Removed profile splitting to keep it simple for testing.

# ── App ──────────────────────────────────────────────────────
spring.application.name=Bookstore Backend

# ── Server ───────────────────────────────────────────────────
server.port=8080

# ── H2 In-Memory Database ────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:bookstoredb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── H2 Console ───────────────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT ──────────────────────────────────────────────────────
jwt.secret=bookstore-secret-key-change-this-in-production-minimum-256-bits
jwt.expiration=86400000

# ── Logging ──────────────────────────────────────────────────
logging.level.com.bookstore=DEBUG
logging.level.org.springframework.security=DEBUG

# ── Swagger ──────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true